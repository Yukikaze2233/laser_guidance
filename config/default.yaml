v4l2:
  device_path: /dev/v4l/by-path/pci-0000:00:14.0-usb-0:4:1.0-video-index0
  width: 1920
  height: 1080
  framerate: 60.0
  pixel_format: mjpeg
  invert_image: false

debug:
  show_window: true
  draw_overlay: true

runtime:
  max_input_age_ms: 25
  max_observation_age_ms: 35
  max_infer_fps: 60
  warmup_frames: 30
  engine_path: "models/exp.engine"
  hit_confirm_frames: 3
  hit_release_frames: 5
  debug_enabled: true
  debug_max_fps: 30
  record_enabled: true
  record_queue_size: 16

inference:
  backend: model
  model_path: models/exp.onnx

streaming:
  enabled: true
  host: "127.0.0.1"
  port: 5004
  sdp_path: "/tmp/laser_guidance.sdp"
  encoder: "h264_nvenc"

udp:
  enabled: true
  host: "127.0.0.1"
  port: 5001

ws30:
  enabled: false
  host: "192.168.137.200"
  points_port: 1001
  imu_port: 1002
  scan_port: 1003
  handshake_interval_ms: 500
  receive_imu: false
  grid_cols: 360
  grid_rows: 150

ekf:
  process_noise_q: 0.05
  measurement_noise_r: 0.5
  initial_pos_std: 100.0
  initial_vel_std: 100.0
  initial_acc_std: 50.0
  max_missed_frames: 5
  lookahead_ms: 12.0

guidance:
  enabled: true
  command_model: geometry
  depth_source: monocular_bbox
  target_geometry:
    - class_id: 0
      width_mm: 72.0
      height_mm: 50.0
    - class_id: 1
      width_mm: 72.0
      height_mm: 50.0
    - class_id: 2
      width_mm: 72.0
      height_mm: 50.0
  camera_calib_path: "config/camera_calib.yaml"
  t_x_mm: -97.0
  t_y_mm: 15.1
  t_z_mm: 146.0
  r_x_deg: 0.31
  r_y_deg: 0.05
  r_z_deg: 1.82
  mirror_separation_mm: 15.0
  max_optical_angle_deg: 30.0
  input_voltage_range_v: 5.0
  dac_voltage_range_v: 10.0
  voltage_model_path: "models/vision_voltage_lut.example.yaml"
  voltage_use_ekf_center: true
  voltage_limit_v: 5.0
  wiring:
    mode: differential
    x_plus_channel: 0
    x_minus_channel: 2
    y_plus_channel: 1
    y_minus_channel: 3
  scan_mode: rectangle
  scan_width_deg: 0.12
  scan_height_deg: 0.16
  scan_grid_n: 8
  lidar_bbox_margin_px: 24.0
  lidar_cluster_tolerance_mm: 120.0
  lidar_min_cluster_points: 8
  lidar_max_depth_mm: 40000.0
